<mat-toolbar class="navbar">
  <!-- <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button> -->

  <span class="title">Task Manager</span>

  <span class="spacer"></span>

<div class="flex items-center gap-2 w-72 mt-4 h-sm">
  <mat-form-field class="w-full" >
      <mat-label>Search Tasks</mat-label>

    <mat-icon matSuffix class="text-gray-400 text-sm mr-2">search</mat-icon>

      <input
        matInput
        type="text"
        [(ngModel)]="searchTerm"
        (input)="searchTerm.set($any($event.target).value)"
        [matAutocomplete]="auto"
      />

      <mat-autocomplete #auto="matAutocomplete">
        <mat-option
          *ngFor="let task of filteredTasks()"
          [value]="task.title"
          (onSelectionChange)="selectTask(task)"
        >
          <div class="flex items-center gap-2">
            <span>{{ task.title }}</span>
            <small
              class="px-2 py-0.5 rounded text-xs font-semibold text-gray-500"
              [ngClass]="statusColors[task.status.toString()]"
              >{{ task.status }}</small
            >
          </div>
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
  <div>
    <button mat-icon-button>
      <mat-icon>notifications</mat-icon>
    </button>

    <button mat-icon-button>
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
</mat-toolbar>
