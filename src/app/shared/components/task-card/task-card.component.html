<div
  cdkDropList
  [id]="listId()"
  [cdkDropListData]="data() ?? []"
  [cdkDropListConnectedTo]="connectedTo()"
  (cdkDropListDropped)="onDrop($event)"
  class="flex flex-col gap-3 my-5 min-h-16">

  <mat-card
    *ngFor="let task of data()"
    cdkDrag
    [cdkDragData]="task"
    class="rounded-xl shadow-sm border border-gray-100 border-l-4 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow duration-200 my-2 mx-2"
    [ngClass]="priorityBorder[task.priority]"
    (click)="onTaskClick(task)">

    <!-- Drag placeholder -->
    <div *cdkDragPlaceholder
      class="rounded-xl border-2 border-dashed border-blue-300 bg-blue-50 h-24 my-2 mx-2">
    </div>

    <mat-card-header class="px-4 pt-3">
      <mat-card-title class="text-sm font-semibold text-gray-800 mt-2">
        <div class="text-xs font-bold px-2 py-0.5 rounded w-fit" [ngClass]="priorityColors[task.priority]">
          {{ task.priority | uppercase }}
        </div>
        <div class="font-medium">{{ task.title }}</div>
      </mat-card-title>
      <mat-card-subtitle class="text-xs text-gray-500 line-clamp-2">{{ task.description }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="px-4 py-2">
      <div class="flex items-center gap-1 text-xs mb-2" [ngClass]="task.isOverdue ? 'text-red-500' : 'text-yellow-500'">
        <span>{{ task.isOverdue ? '⚠️' : '📅' }}</span>
        <span>{{ getDateDifferenceLabel(task.dueDate) }}</span>
      </div>
      <div class="flex flex-wrap gap-1 my-2">
        <span *ngFor="let tag of task.tags"
          class="text-xs text-gray-500 px-2 py-0.5 rounded-full">
          {{ tag }}
        </span>
      </div>
    </mat-card-content>

    <hr class="border-b border-gray-100 mx-4"/>
    <mat-card-footer class="px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold">
          {{ task.assignee.name | slice:0:2 | uppercase }}
        </div>
        <span class="text-xs text-gray-600">{{'@'}}{{ task.assignee.name }}</span>
      </div>
    </mat-card-footer>

  </mat-card>
</div>
