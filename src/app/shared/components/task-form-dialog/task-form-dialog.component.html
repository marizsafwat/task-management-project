<h2 mat-dialog-title>{{data.type === 'add' ? 'Add New Task' : 'Edit Task'}}</h2>

<form [formGroup]="taskForm" (ngSubmit)="save()">

  <mat-dialog-content class="dialog-content">

    <mat-form-field  class="w-full">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title">
    </mat-form-field>

    <mat-form-field  class="w-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    <mat-form-field  class="w-full">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        @for (p of priorities; track p) {
          <mat-option [value]="p">{{p}}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field class="w-full">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        @for (s of statuses; track s) {
          <mat-option [value]="s">{{s}}</mat-option>
        }
      </mat-select>
    </mat-form-field>

<mat-form-field >
  <mat-label>Due Date</mat-label>

  <input matInput [matDatepicker]="picker" formControlName="dueDate">

  <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>

  <mat-datepicker #picker></mat-datepicker>
</mat-form-field>

    <mat-form-field  class="w-full">
      <mat-label>Assignee</mat-label>
      <mat-select formControlName="assignee" [compareWith]="compareAssignee">
        @for (s of assigneList(); track s.id) {
          <mat-option [value]="s">{{s.name}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="taskForm.invalid" (click)="save()">
      {{data.type === 'add' ? 'Add' : 'Save'}}
    </button>
  </mat-dialog-actions>

</form>
