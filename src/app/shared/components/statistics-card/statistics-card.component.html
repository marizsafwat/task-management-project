<mat-card class="task-card shadow-md rounded-xl h-full">
  
  <mat-card-header class="p-4 mb-5">
    <mat-card-subtitle class="flex items-center gap-2 text-sm font-medium text-gray-500">
      <mat-icon class="text-base">{{ statistic()?.icon }}</mat-icon>
      {{ statistic()?.title }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="px-4 py-2">
    <h1 class="text-3xl sm:text-2xl font-bold text-black">
      {{ statistic()?.value }}
    </h1>
  </mat-card-content>

  <mat-card-footer class="px-4 py-3 text-sm font-medium flex items-center gap-1"
    [ngStyle]="{ color: statistic()?.color }">
    {{ statistic()?.change }} {{ statistic()?.changeLabel }}
  </mat-card-footer>

</mat-card>
