<mat-card class="rounded-2xl shadow-sm border border-gray-100 p-4">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-sm font-bold text-gray-700">Recent Activity</h3>
    <span class="text-xs text-gray-400">{{ activities().length }} events</span>
  </div>

  @if (activities().length === 0) {
    <div class="flex flex-col items-center justify-center py-8 text-gray-400">
      <span class="text-3xl mb-2">📋</span>
      <p class="text-sm">No activity yet</p>
    </div>
  }

  <div class="flex flex-col gap-3 max-h-80 overflow-y-auto">
    @for (activity of activities(); track activity.id) {
      <div class="flex items-start gap-3">

        <!-- Icon -->
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs flex-shrink-0"
          [ngClass]="actionColors[activity.action]">
          {{ actionIcons[activity.action] }}
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <p class="text-xs text-gray-700 leading-relaxed">{{ activity.description }}</p>
          <span class="text-xs text-gray-400">{{ getTimeAgo(activity.timestamp) }}</span>
        </div>

      </div>
    }
  </div>
</mat-card>
